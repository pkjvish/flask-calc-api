AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Complete infrastructure for Flask Calc API.
  Creates: VPC, Subnets, Internet Gateway, Route Tables, Security Groups,
  ECR Repository, ECS Cluster, ECS Task Definition, ECS Service,
  Application Load Balancer, CloudWatch Log Group, and all IAM Roles.

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETERS  — the only values you need to fill in before deploying
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: calc-api
    Description: Used as a prefix for every resource name.

  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

  # VPC CIDR blocks — safe to leave as defaults unless they clash with
  # another VPC you already have in the same account.
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: First public subnet (AZ-a). ECS tasks and ALB live here.

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: Second public subnet (AZ-b). Required by ALB for HA.

  # ECS task sizing — 256 CPU units = 0.25 vCPU, 512 MB RAM (free-tier friendly)
  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "4096"]

  DesiredTaskCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── 1. VPC ─────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc"

  # ── 2. Internet Gateway (gives the VPC a route to the public internet) ─────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── 3. Public Subnets ──────────────────────────────────────────────────────
  #  Two subnets in different Availability Zones.
  #  ALB requires at least 2 AZs. ECS tasks get public IPs directly
  #  (no NAT Gateway needed, which saves cost on a new account).

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true   # ECS Fargate tasks receive a public IP
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-subnet-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-subnet-2"

  # ── 4. Route Table (sends all outbound traffic through the IGW) ────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ── 5. Security Groups ─────────────────────────────────────────────────────

  # ALB Security Group: internet → ALB on port 80
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-alb-sg"
      GroupDescription: Allow HTTP from the internet to the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-sg"

  # ECS Security Group: ALB → ECS tasks on port 5000 only
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-ecs-sg"
      GroupDescription: Allow traffic from ALB to ECS tasks on port 5000
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: From ALB only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound (needed to pull ECR images, write logs)
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ecs-sg"

  # ── 6. ECR Repository ──────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ProjectName
      ImageScanningConfiguration:
        ScanOnPush: true          # free vulnerability scan on every push
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep only last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ecr"

  # ── 7. CloudWatch Log Group ────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}"
      RetentionInDays: 30

  # ── 8. IAM Roles ───────────────────────────────────────────────────────────

  # ECS Task Execution Role: used by the ECS AGENT to pull images & write logs
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-task-execution-role"

  # ECS Task Role: used by YOUR APPLICATION CODE inside the container
  # (add more permissions here if your app needs S3, DynamoDB, etc.)
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-task-role"

  # GitHub Actions Deployer IAM User (for CI/CD)
  GitHubActionsUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "${ProjectName}-github-deployer"
      Policies:
        - PolicyName: ECRPushAndECSDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ECR: authenticate, push images
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: "*"
              # ECS: register task definitions, update service
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeServices
                  - ecs:UpdateService
                  - ecs:DescribeClusters
                Resource: "*"
              # IAM: pass roles to ECS (required by aws-actions/amazon-ecs-deploy)
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt ECSTaskExecutionRole.Arn
                  - !GetAtt ECSTaskRole.Arn

  # Access key for the GitHub Actions user
  GitHubActionsAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref GitHubActionsUser

  # ── 9. ECS Cluster ─────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-cluster"

  # ── 10. ECS Task Definition ────────────────────────────────────────────────
  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ProjectName
      NetworkMode: awsvpc           # required for Fargate
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: !Ref ProjectName
          # On first deploy the image doesn't exist yet — GitHub Actions will
          # update the task definition with the real ECR image URI.
          # For stack creation we use a public placeholder that always starts.
          Image: public.ecr.aws/docker/library/python:3.12-slim
          Essential: true
          PortMappings:
            - ContainerPort: 5000
              Protocol: tcp
          Environment:
            - Name: FLASK_ENV
              Value: !Ref EnvironmentName
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:5000/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 15
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-task-def"

  # ── 11. Application Load Balancer ──────────────────────────────────────────
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: InternetGatewayAttachment
    Properties:
      Name: !Sub "${ProjectName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-tg"
      Port: 5000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip             # required for awsvpc / Fargate
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-tg"

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ── 12. ECS Service ────────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener          # must exist before ECS service can register
    Properties:
      ServiceName: !Sub "${ProjectName}-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ECSTaskDefinition
      DesiredCount: !Ref DesiredTaskCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED   # tasks need public IP to pull ECR images
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: !Ref ProjectName
          ContainerPort: 5000
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-service"

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS  — values you need to copy into GitHub Secrets / deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  # ── Copy these values into your GitHub Actions secrets ──
  GitHubActionsAccessKeyId:
    Description: >
      AWS_ACCESS_KEY_ID — paste this into GitHub → Settings → Secrets → Actions
    Value: !Ref GitHubActionsAccessKey

  GitHubActionsSecretAccessKey:
    Description: >
      AWS_SECRET_ACCESS_KEY — paste this into GitHub → Settings → Secrets → Actions
    Value: !GetAtt GitHubActionsAccessKey.SecretAccessKey

  # ── Copy these values into deploy.yml env block ──
  ECRRepositoryURI:
    Description: >
      ECR_REPOSITORY value for deploy.yml  (just the repo name, not full URI)
    Value: !Ref ECRRepository
    Export:
      Name: !Sub "${ProjectName}-ecr-repo-name"

  ECRRepositoryFullURI:
    Description: Full ECR URI used in docker push commands
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}"

  ECSClusterName:
    Description: ECS_CLUSTER value for deploy.yml
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${ProjectName}-cluster-name"

  ECSServiceName:
    Description: ECS_SERVICE value for deploy.yml
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${ProjectName}-service-name"

  AWSRegion:
    Description: AWS_REGION value for deploy.yml
    Value: !Ref AWS::Region

  # ── Verify your deployment ──
  LoadBalancerURL:
    Description: Public URL of your API (available ~2 min after first ECS task starts)
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"
    Export:
      Name: !Sub "${ProjectName}-alb-url"